<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Picks Prime - ODIN Link</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050810;
            --container-bg: #0a0e17;
            --text-color: #e0f2fe;
            --input-bg: #111827;
            --border-color: #1e293b;
            --neon-cyan: #00f0ff;
            --neon-red: #ff0055;
            --neon-green: #00ff88;
            --neon-gold: #ffbe0b;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
        }

        .header h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-cyan);
            font-size: 26px;
            margin: 0 0 5px 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            text-transform: uppercase;
        }

        .header p {
            font-size: 14px;
            color: #64748b;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--container-bg);
            border-radius: 8px;
            padding: 24px;
            box-sizing: border-box;
            border: 1px solid #1e293b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        /* Cyberpunk corner accents */
        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 2px;
            background-color: var(--neon-cyan);
        }
        .form-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 30px;
            background-color: var(--neon-cyan);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .locked-badge {
            color: var(--neon-cyan);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            background-color: rgba(0, 240, 255, 0.02);
        }
        
        input:read-only {
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--neon-cyan);
            border-color: #1e293b;
            cursor: not-allowed;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }

        .result-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .toggle-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: #94a3b8;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn.win.active {
            background-color: rgba(0, 255, 136, 0.1);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .toggle-btn.loss.active {
            background-color: rgba(255, 0, 85, 0.1);
            border-color: var(--neon-red);
            color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }
        
        .toggle-btn.be.active {
            background-color: rgba(255, 190, 11, 0.1);
            border-color: var(--neon-gold);
            color: var(--neon-gold);
            box-shadow: 0 0 15px rgba(255, 190, 11, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00f0ff 0%, #0088ff 100%);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .submit-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            transform: translateY(-1px);
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .row .form-group {
            flex: 1;
        }

        /* Hide number arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SMART PICKS PRIME</h1>
        <p id="mode-subtitle">ODIN SYNCHRONIZATION // INITIALIZING</p>
    </div>

    <div class="form-container">
        <!-- Pre-filled & Locked Fields -->
        <div class="row">
            <div class="form-group">
                <label>Asset <span class="locked-badge">🔒 SYSTEM</span></label>
                <input type="text" id="pair" readonly>
            </div>
            <div class="form-group">
                <label>Direction <span class="locked-badge">🔒 SYSTEM</span></label>
                <input type="text" id="direction" readonly>
            </div>
        </div>

        <!-- Mode: CLOSE (Result) -->
        <div id="close-only-fields" class="hidden">
            <div class="form-group">
                <label>Trade Outcome</label>
                <div class="result-toggle">
                    <button type="button" class="toggle-btn win" onclick="setResult('WIN')">WIN</button>
                    <button type="button" class="toggle-btn be" onclick="setResult('BREAK_EVEN')">B/E</button>
                    <button type="button" class="toggle-btn loss" onclick="setResult('LOSS')">LOSS</button>
                </div>
            </div>
        </div>

        <!-- Universal Fields -->
        <div class="row">
            <div class="form-group">
                <label>Your Entry Price</label>
                <input type="number" id="entry" step="any" placeholder="0.0000">
            </div>
            <div class="form-group" id="exit-field-container">
                <label>Your Exit Price</label>
                <input type="number" id="exit" step="any" placeholder="0.0000">
            </div>
        </div>
        
        <!-- Subscriber Discipline Fields -->
        <div class="row">
            <div class="form-group">
                <label>Stop Loss Placed At</label>
                <input type="number" id="sl" step="any" placeholder="0.0000">
            </div>
            <div class="form-group">
                <label>Take Profit Placed At</label>
                <input type="number" id="tp" step="any" placeholder="0.0000">
            </div>
        </div>

        <!-- Mode: CLOSE (ROI) -->
        <div id="roi-field-container" class="form-group hidden">
            <label>Net ROI (%) <span style="color: #64748b; font-weight: 400; text-transform: none;">(Ex: 45.2)</span></label>
            <input type="number" id="pnl" step="any" placeholder="0.0">
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitToOdin()">TRANSMIT TO ODIN</button>
    </div>

    <script>
        let currentResult = '';
        let currentMode = 'close'; // default
        const tg = window.Telegram.WebApp;

        // Initialize Telegram Web App
        tg.expand(); 
        
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const assetParam = urlParams.get('asset') || 'UNKNOWN';
        const dirParam = urlParams.get('direction') || 'UNKNOWN';
        const modeParam = urlParams.get('mode') || 'close';
        
        // Setup the form based on parameters
        document.getElementById('pair').value = assetParam.toUpperCase();
        document.getElementById('direction').value = dirParam.toUpperCase();
        currentMode = modeParam.toLowerCase();
        
        // Configure UI based on OPEN vs CLOSE mode
        if (currentMode === 'open') {
            document.getElementById('mode-subtitle').innerText = 'ODIN // ENTRY SYNCHRONIZATION';
            document.getElementById('submit-btn').innerText = 'CONFIRM ENTRY DATA';
            document.getElementById('exit-field-container').classList.add('hidden');
        } else {
            document.getElementById('mode-subtitle').innerText = 'ODIN // EXECUTION REVIEW';
            document.getElementById('submit-btn').innerText = 'TRANSMIT FINAL DATA';
            document.getElementById('close-only-fields').classList.remove('hidden');
            document.getElementById('roi-field-container').classList.remove('hidden');
        }

        function setResult(res) {
            currentResult = res;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            
            if (res === 'WIN') document.querySelector('.toggle-btn.win').classList.add('active');
            else if (res === 'LOSS') document.querySelector('.toggle-btn.loss').classList.add('active');
            else if (res === 'BREAK_EVEN') document.querySelector('.toggle-btn.be').classList.add('active');
        }

        function submitToOdin() {
            const pair = document.getElementById('pair').value;
            const direction = document.getElementById('direction').value;
            const entry = document.getElementById('entry').value;
            const sl = document.getElementById('sl').value;
            const tp = document.getElementById('tp').value;
            
            // Validation
            if (!entry) {
                tg.showAlert("Entry Price is required for ODIN synchronization.");
                return;
            }
            
            let data = {
                action: "crowd_feedback",
                mode: currentMode,
                pair: pair,
                direction: direction,
                entry: parseFloat(entry),
                sl: sl ? parseFloat(sl) : null,
                tp: tp ? parseFloat(tp) : null,
                user_id: tg.initDataUnsafe?.user?.id || "unknown",
                username: tg.initDataUnsafe?.user?.username || "unknown"
            };

            if (currentMode === 'close') {
                const exit = document.getElementById('exit').value;
                const pnl = document.getElementById('pnl').value;
                
                if (!exit || !currentResult) {
                    tg.showAlert("Exit Price and Trade Outcome are required.");
                    return;
                }
                
                data.exit = parseFloat(exit);
                data.result = currentResult;
                data.pnl_pct = pnl ? parseFloat(pnl) : 0;
            }

            // Send data silently back to the Bot
            tg.sendData(JSON.stringify(data));
            
            // Close the web app window
            tg.close();
        }
    </script>
</body>
</html>
